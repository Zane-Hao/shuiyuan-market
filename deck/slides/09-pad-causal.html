<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>08 · PAD 因果</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body { background: var(--bg); position: relative; overflow: hidden; }
  body::before {
    content: ''; position: absolute; inset: 0;
    background-image: radial-gradient(rgba(47,93,79,0.045) 1px, transparent 1.5px);
    background-size: 5px 5px; pointer-events: none; opacity: .55;
  }

  .slide {
    padding: 88px 96px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 48px;
    position: relative;
    z-index: 1;
  }
  .header { display: flex; justify-content: space-between; align-items: baseline; }

  h2 {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 80px;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 12px;
  }
  h2 .accent { color: var(--accent); font-style: italic; }

  .body-grid {
    display: grid;
    grid-template-columns: 0.85fr 1.15fr;
    gap: 80px;
    align-items: center;
  }

  .pad-bars {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    height: 380px;
    align-items: end;
  }
  .pad-bar {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    height: 100%;
    justify-content: flex-end;
  }
  .pad-bar .num {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 56px;
    color: var(--warn);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .pad-bar .num span { font-size: 16px; font-family: var(--font-mono); color: var(--muted); margin-left: 4px; }
  .pad-bar .bar {
    width: 100%;
    height: 240px;
    background: rgba(47,93,79,0.1);
    position: relative;
    overflow: hidden;
  }
  .pad-bar .fill {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 0;
    background: linear-gradient(to top, var(--warn), #c25646);
    transition: height 1.4s var(--ease-out-expo);
  }
  .pad-bar .label {
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    text-align: center;
  }
  .pad-bar .label .key {
    color: var(--accent);
    font-family: var(--font-mono);
    font-weight: 400;
  }

  .causal {
    text-align: left;
  }
  .causal-row {
    display: grid;
    grid-template-columns: auto auto auto;
    align-items: center;
    gap: 32px;
  }
  .causal-num {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 156px;
    line-height: 0.9;
    letter-spacing: -0.04em;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }
  .causal-num .pct {
    color: var(--accent);
    font-size: 80px;
    font-style: italic;
  }
  .causal-arrow {
    font-family: var(--font-display);
    font-size: 96px;
    color: var(--muted);
    font-weight: 400;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform .9s var(--ease-out-expo);
  }
  .causal-arrow.in { transform: scaleX(1); }
  .causal-num-2 {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 156px;
    line-height: 0.9;
    color: var(--accent);
    letter-spacing: -0.04em;
    font-variant-numeric: tabular-nums;
  }
  .causal-num-2 .pct {
    color: var(--ink);
    font-size: 80px;
    font-style: italic;
  }
  .causal-row > div {
    opacity: 0;
    transform: translateY(20px);
    filter: blur(8px);
    transition: opacity .8s var(--ease-out-expo), transform .8s var(--ease-out-expo), filter .8s var(--ease-out-expo);
  }
  .causal-row > div.in { opacity: 1; transform: translateY(0); filter: blur(0); }
  .causal-labels {
    display: grid;
    grid-template-columns: auto auto auto;
    gap: 32px;
    margin-top: 20px;
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .causal-cite {
    margin-top: 32px;
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--muted);
    font-style: italic;
  }
  .causal-cite .cite {
    font-family: var(--font-mono);
    font-size: 0.85em;
    background: rgba(224,122,60,0.1);
    color: var(--accent);
    padding: 1px 6px;
    margin-left: 4px;
  }

  .fadeup {
    opacity: 0; transform: translateY(18px); filter: blur(6px);
    transition: opacity .7s var(--ease-out-expo), transform .7s var(--ease-out-expo), filter .7s var(--ease-out-expo);
  }
  .fadeup.in { opacity: 1; transform: translateY(0); filter: blur(0); }
</style>
</head>
<body>
<div class="slide">

  <div class="header">
    <div class="label-sm fadeup" data-delay="200">
      <span class="num">07</span><span class="rule"></span>
      <span>DATA · 數據錨點 · PAD 模型</span>
    </div>
    <div class="fadeup" data-delay="350" style="font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.22em; color: var(--muted);">MEHRABIAN-RUSSELL 1974 · PATH INTELLIGENCE 2007</div>
  </div>

  <div class="body-grid">
    <div class="pad-bars">
      <div class="pad-bar">
        <div class="num fadeup" data-delay="1700">30<span>/100</span></div>
        <div class="bar"><div class="fill" id="bar-p"></div></div>
        <div class="label fadeup" data-delay="1100"><span class="key">P.</span> Pleasure 愉悅度</div>
      </div>
      <div class="pad-bar">
        <div class="num fadeup" data-delay="1850">25<span>/100</span></div>
        <div class="bar"><div class="fill" id="bar-a"></div></div>
        <div class="label fadeup" data-delay="1250"><span class="key">A.</span> Arousal 激發度</div>
      </div>
      <div class="pad-bar">
        <div class="num fadeup" data-delay="2000">20<span>/100</span></div>
        <div class="bar"><div class="fill" id="bar-d"></div></div>
        <div class="label fadeup" data-delay="1400"><span class="key">D.</span> Dominance 支配感</div>
      </div>
    </div>

    <div class="causal">
      <h2 class="fadeup" data-delay="600">
        停留是<span class="accent">因</span>，<br>
        銷售是<span class="accent">果</span>。
      </h2>

      <div class="causal-row" style="margin-top: 40px;">
        <div data-delay="2400" data-sfx="focus">
          <div class="causal-num">+1<span class="pct">%</span></div>
        </div>
        <div data-delay="2700" data-sfx="tap" id="arrow-wrap">
          <div class="causal-arrow" id="arrow">→</div>
        </div>
        <div data-delay="3000" data-sfx="sparkle">
          <div class="causal-num-2">+1.3<span class="pct">%</span></div>
        </div>
      </div>
      <div class="causal-labels">
        <div class="fadeup" data-delay="2500">停留時間 / DWELL</div>
        <div></div>
        <div class="fadeup" data-delay="3100">銷售額 / REVENUE</div>
      </div>

      <div class="causal-cite fadeup" data-delay="3500">
        Path Intelligence 9-month UK retail study, 2007 <span class="cite">[2][3]</span>
      </div>
    </div>
  </div>

  <div class="credit">SHUI-YUAN · SDG · 2026</div>
  <div class="page-indicator"><span class="now">09</span> / 21</div>
</div>

<script>
  function sfx(c){try{window.parent.postMessage({type:'sfx',cue:c},'*')}catch(_){}}
  document.querySelectorAll('[data-delay]').forEach(el=>{
    const d=+el.dataset.delay||0;
    setTimeout(()=>{el.classList.add('in');if(el.dataset.sfx)sfx(el.dataset.sfx)},d);
  });

  // Bars grow staggered
  setTimeout(()=>{ document.getElementById('bar-p').style.height = '30%'; sfx('focus'); }, 1500);
  setTimeout(()=>{ document.getElementById('bar-a').style.height = '25%'; }, 1700);
  setTimeout(()=>{ document.getElementById('bar-d').style.height = '20%'; }, 1900);

  // Arrow scale-in (overrides default fadeup)
  setTimeout(()=>{ document.getElementById('arrow').classList.add('in'); }, 2700);
</script>
</body>
</html>
