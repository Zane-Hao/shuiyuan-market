<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>10 · Tier 1 衛生底線</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body { background: var(--bg); position: relative; overflow: hidden; }

  .slide {
    padding: 0;
    margin: 0;
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
  }

  /* Tier header band — mirroring website's tier card */
  .tier-band {
    background: #5C7A85;
    color: var(--bg);
    padding: 44px 56px;
    margin: 0;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: baseline;
    gap: 48px;
    box-sizing: border-box;
  }
  .tier-band .left-group {
    display: flex;
    align-items: baseline;
    gap: 28px;
  }
  .phase-num {
    font-family: var(--font-mono);
    font-size: 14px;
    letter-spacing: 0.22em;
    opacity: 0.85;
  }
  .tier-title {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 56px;
    line-height: 1.05;
    letter-spacing: -0.02em;
  }
  .timeline-pill {
    font-family: var(--font-mono);
    font-size: 14px;
    letter-spacing: 0.18em;
    border: 1px solid rgba(251,247,238,0.5);
    padding: 8px 18px;
  }
  .tier-sub {
    grid-column: 1 / -1;
    font-family: var(--font-body);
    font-size: 22px;
    line-height: 1.4;
    margin-top: 14px;
    opacity: 0.85;
  }

  .body-pane {
    padding: 56px 56px 64px;
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    gap: 64px;
    align-items: start;
    min-height: 0;
    overflow: hidden;
  }

  .actions {
    display: grid;
    gap: 0;
    min-height: 0;
    align-self: stretch;
  }
  .action {
    display: grid;
    grid-template-columns: 72px 1fr;
    gap: 22px;
    align-items: baseline;
    padding: 22px 0;
    border-top: 1px solid var(--hairline);
  }
  .action:first-child { border-top: 0; padding-top: 0; }
  .action .ord {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 28px;
    line-height: 1;
    color: #5C7A85;
    letter-spacing: -0.02em;
  }
  .action .text {
    font-family: var(--font-body);
    font-size: 22px;
    line-height: 1.4;
    color: var(--ink);
  }

  .photos {
    display: grid;
    grid-template-rows: 1fr 1fr;
    gap: 18px;
    min-height: 0;
    height: 100%;
  }
  .photos figure {
    position: relative;
    overflow: hidden;
    border: 1px solid var(--hairline);
    min-height: 0;
  }
  .photos figure img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    animation: photo-zoom 14s var(--ease-out-expo) both;
  }
  @keyframes photo-zoom { from { transform: scale(1.04); } to { transform: scale(1.16); } }
  .photos figcaption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 18px 22px 14px;
    color: var(--bg);
  }
  .photos .tag {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.2em;
    opacity: 0.9;
  }
  .photos .desc {
    margin-top: 4px;
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.4;
  }

  .fadeup {
    opacity: 0; transform: translateY(18px); filter: blur(6px);
    transition: opacity .7s var(--ease-out-expo), transform .7s var(--ease-out-expo), filter .7s var(--ease-out-expo);
  }
  .fadeup.in { opacity: 1; transform: translateY(0); filter: blur(0); }
</style>
</head>
<body>
<div class="slide">

  <div class="tier-band">
    <div class="left-group">
      <div class="phase-num fadeup" data-delay="200" data-sfx="tap">PHASE 01</div>
      <div class="tier-title fadeup" data-delay="500" data-sfx="focus">衛生底線重建</div>
    </div>
    <div class="timeline-pill fadeup" data-delay="800" data-sfx="tap">短期 · 3-6 個月</div>
    <div class="tier-sub fadeup" data-delay="1100">建立「敢進來、願意再來」的環境基準。</div>
  </div>

  <div class="body-pane">
    <div class="actions">
      <div class="action fadeup" data-delay="1500" data-sfx="tap">
        <div class="ord">01</div>
        <div class="text">排水管線清淤、截油槽定期清洗</div>
      </div>
      <div class="action fadeup" data-delay="1700" data-sfx="tap">
        <div class="ord">02</div>
        <div class="text">二樓生鮮區地板防滑與沖洗系統升級</div>
      </div>
      <div class="action fadeup" data-delay="1900" data-sfx="tap">
        <div class="ord">03</div>
        <div class="text">廁所全面翻修、加強通風（RGFT 模組）</div>
      </div>
      <div class="action fadeup" data-delay="2100" data-sfx="tap">
        <div class="ord">04</div>
        <div class="text">定期病媒防治機制（鼠患／蟑螂）</div>
      </div>
      <div class="action fadeup" data-delay="2300" data-sfx="tap">
        <div class="ord">05</div>
        <div class="text">內側攤位採光與基礎照明強化</div>
      </div>
    </div>

    <div class="photos">
      <figure class="fadeup" data-delay="1800">
        <img src="../../img/phase1-plumbing.jpg" alt="管線重建">
        <figcaption>
          <div class="tag">PLUMBING · 管線重建</div>
          <div class="desc">排水主幹、截油槽、廢水管全面汰換</div>
        </figcaption>
      </figure>
      <figure class="fadeup" data-delay="2100">
        <img src="../../img/phase1-toilet.jpg" alt="多元友善廁所">
        <figcaption>
          <div class="tag">RESTROOM · 多元友善廁所</div>
          <div class="desc">RGFT 模組翻新並強化通風</div>
        </figcaption>
      </figure>
    </div>
  </div>

  <div class="credit" style="bottom: 18px;">SHUI-YUAN · SDG · 2026</div>
  <div class="page-indicator" style="bottom: 18px;"><span class="now">11</span> / 18</div>
</div>

<script>
  function sfx(c){try{window.parent.postMessage({type:'sfx',cue:c},'*')}catch(_){}}
  document.querySelectorAll('[data-delay]').forEach(el=>{
    const d=+el.dataset.delay||0;
    setTimeout(()=>{el.classList.add('in');if(el.dataset.sfx)sfx(el.dataset.sfx)},d);
  });
</script>
</body>
</html>
