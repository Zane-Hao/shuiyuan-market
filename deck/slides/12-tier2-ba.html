<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>11 · Tier 2 餐食集中</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body { background: var(--bg); position: relative; overflow: hidden; }

  .slide {
    padding: 0;
    margin: 0;
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr auto;
  }

  .tier-band {
    background: var(--accent);
    color: var(--bg);
    padding: 44px 56px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: baseline;
    gap: 48px;
  }
  .tier-band .left-group {
    display: flex;
    align-items: baseline;
    gap: 28px;
  }
  .phase-num {
    font-family: var(--font-mono);
    font-size: 14px;
    letter-spacing: 0.22em;
    opacity: 0.85;
  }
  .tier-title {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 56px;
    line-height: 1.05;
    letter-spacing: -0.02em;
  }
  .timeline-pill {
    font-family: var(--font-mono);
    font-size: 14px;
    letter-spacing: 0.18em;
    border: 1px solid rgba(251,247,238,0.5);
    padding: 8px 18px;
  }

  .ba-pane {
    padding: 50px 56px;
    display: grid;
    grid-template-columns: 1fr 80px 1fr;
    gap: 0;
    align-items: stretch;
  }

  .ba-side {
    position: relative;
    overflow: hidden;
    border: 2px solid var(--ink);
  }
  .ba-side img {
    width: 100%; height: 100%;
    object-fit: cover;
    animation: photo-zoom 14s var(--ease-out-expo) both;
  }
  @keyframes photo-zoom { from { transform: scale(1.05); } to { transform: scale(1.16); } }

  .ba-side .badge {
    position: absolute;
    top: 24px;
    padding: 10px 22px;
    font-family: var(--font-mono);
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    z-index: 2;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
  }
  .ba-side.before .badge {
    left: 24px;
    background: var(--warn);
    color: var(--bg);
  }
  .ba-side.after .badge {
    right: 24px;
    background: var(--bg);
    color: var(--ink);
    border: 1px solid var(--ink);
  }

  .ba-side .desc {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 28px 28px 24px;
    background: linear-gradient(transparent, rgba(0,0,0,0.92));
    color: var(--bg);
  }
  .ba-side .desc h3 {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 32px;
    line-height: 1.1;
  }
  .ba-side .desc p {
    margin-top: 6px;
    font-family: var(--font-body);
    font-size: 17px;
    line-height: 1.4;
    opacity: 0.85;
  }

  .ba-divider {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative;
  }
  .ba-divider .arrow {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 72px;
    line-height: 1;
    color: var(--accent);
    opacity: 0;
    transform: translateX(-12px);
    transition: opacity .9s var(--ease-out-expo), transform .9s var(--ease-out-expo);
  }
  .ba-divider .arrow.in { opacity: 1; transform: translateX(0); }

  .ba-side.before { transform: translateX(-30px); opacity: 0; transition: transform 1s var(--ease-out-expo), opacity 1s var(--ease-out-expo); }
  .ba-side.after  { transform: translateX(30px); opacity: 0; transition: transform 1s var(--ease-out-expo), opacity 1s var(--ease-out-expo); }
  .ba-side.before.in { transform: translateX(0); opacity: 1; }
  .ba-side.after.in  { transform: translateX(0); opacity: 1; }

  .keypts {
    padding: 30px 56px 50px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 48px;
    border-top: 1px solid var(--hairline);
  }
  .keypt {
    padding-top: 18px;
    border-top: 1px solid var(--hairline);
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 18px;
    align-items: baseline;
  }
  .keypt .ord {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 28px;
    line-height: 1;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  .keypt h4 {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 22px;
    color: var(--ink);
  }
  .keypt p {
    margin-top: 6px;
    font-family: var(--font-body);
    font-size: 14.5px;
    line-height: 1.5;
    color: var(--muted);
  }

  .fadeup {
    opacity: 0; transform: translateY(18px);
    transition: opacity .7s var(--ease-out-expo), transform .7s var(--ease-out-expo);
  }
  .fadeup.in { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>
<div class="slide">

  <div class="tier-band">
    <div class="left-group">
      <div class="phase-num fadeup" data-delay="200" data-sfx="tap">PHASE 02</div>
      <div class="tier-title fadeup" data-delay="500" data-sfx="focus">餐食區集中化改造</div>
    </div>
    <div class="timeline-pill fadeup" data-delay="800" data-sfx="tap">中期 · 6-12 個月</div>
  </div>

  <div class="ba-pane">
    <div class="ba-side before" data-delay="1300" data-sfx="dissolve">
      <img src="../../img/aisle-2.jpg" alt="改造前">
      <div class="badge">BEFORE</div>
      <div class="desc">
        <h3>攤前直接用餐</h3>
        <p>站立、無動線分區、生熟食混雜</p>
      </div>
    </div>
    <div class="ba-divider">
      <div class="arrow" id="arrow">→</div>
    </div>
    <div class="ba-side after" data-delay="1700" data-sfx="sparkle">
      <img src="../../img/nanmen-foodcourt.jpg" alt="改造後">
      <div class="badge">AFTER</div>
      <div class="desc">
        <h3>集中食堂模式</h3>
        <p>獨立用餐區 · 統一餐盤 · 動線分流</p>
      </div>
    </div>
  </div>

  <div class="keypts">
    <div class="keypt fadeup" data-delay="2700"><div class="ord">01</div><div><h4>統一餐盤</h4><p>市場統一管理碗盤回收與消毒</p></div></div>
    <div class="keypt fadeup" data-delay="2900"><div class="ord">02</div><div><h4>集中用餐區</h4><p>買食物與吃食物的空間明確分離</p></div></div>
    <div class="keypt fadeup" data-delay="3100"><div class="ord">03</div><div><h4>生熟食動線</h4><p>肉攤回歸採購、用餐區獨立</p></div></div>
  </div>

  <div class="credit" style="bottom: 18px;">SHUI-YUAN · SDG · 2026</div>
  <div class="page-indicator" style="bottom: 18px;"><span class="now">12</span> / 18</div>
</div>

<script>
  function sfx(c){try{window.parent.postMessage({type:'sfx',cue:c},'*')}catch(_){}}
  document.querySelectorAll('[data-delay]').forEach(el=>{
    const d=+el.dataset.delay||0;
    setTimeout(()=>{el.classList.add('in');if(el.dataset.sfx)sfx(el.dataset.sfx)},d);
  });
  setTimeout(()=>{ document.getElementById('arrow').classList.add('in'); sfx('whoosh'); }, 2200);
</script>
</body>
</html>
