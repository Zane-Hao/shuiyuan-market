<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>06 · 方法論</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body { background: var(--bg); position: relative; overflow: hidden; }
  body::before {
    content: ''; position: absolute; inset: 0;
    background-image: radial-gradient(rgba(47,93,79,0.045) 1px, transparent 1.5px);
    background-size: 5px 5px; pointer-events: none;
    animation: grain-shift 8s ease-in-out infinite;
  }
  @keyframes grain-shift { 0%,100%{transform:translate(0,0);opacity:.55} 50%{transform:translate(2px,2px);opacity:.7} }

  .slide {
    padding: 72px 56px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 48px;
    position: relative;
    z-index: 1;
  }
  .header { display: flex; justify-content: space-between; align-items: baseline; }

  .body-grid {
    display: grid;
    grid-template-columns: 1fr 560px;
    gap: 64px;
    align-items: center;
  }
  h2 {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 84px;
    line-height: 1.12;
    letter-spacing: -0.02em;
    color: var(--ink);
    /* nowrap kept on each line via inline-block spans below;
       removing the outer h2 nowrap so the explicit <br> can break cleanly */
  }
  h2 .accent { color: var(--accent); }
  .lead {
    margin-top: 32px;
    font-family: var(--font-body);
    font-size: 26px;
    line-height: 1.6;
    color: var(--ink);
  }

  .method-card {
    background: var(--surface);
    border: 1px solid var(--hairline);
    padding: 52px 48px;
  }
  .method-row {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 24px;
    padding: 22px 0;
    border-top: 1px solid var(--hairline);
    align-items: baseline;
  }
  .method-row:first-child { border-top: 0; padding-top: 0; }
  .method-row dt {
    font-family: var(--font-mono);
    font-size: 15px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .method-row dd {
    font-family: var(--font-body);
    font-size: 22px;
    line-height: 1.5;
    color: var(--ink);
  }
  .method-row dd strong { color: var(--accent); }

  .fadeup {
    opacity: 0; transform: translateY(18px); filter: blur(6px);
    transition: opacity .7s var(--ease-out-expo), transform .7s var(--ease-out-expo), filter .7s var(--ease-out-expo);
  }
  .fadeup.in { opacity: 1; transform: translateY(0); filter: blur(0); }

  .left-fade {
    opacity: 0; transform: translateX(-20px);
    transition: opacity .7s var(--ease-out-expo), transform .7s var(--ease-out-expo);
  }
  .left-fade.in { opacity: 1; transform: translateX(0); }

  /* Typewriter — character-by-character reveal with blinking caret.
     Uses TreeWalker over text nodes to preserve inline accent spans.
     Element occupies its full final layout from the start (no shift). */
  .typewriter {
    display: inline;
  }
  .typewriter.tw-typing::after,
  .typewriter.tw-done::after {
    content: '|';
    display: inline-block;
    margin-left: 0.06em;
    font-weight: 200;
    color: currentColor;
    opacity: 0.7;
    animation: tw-caret 0.65s infinite step-end;
    vertical-align: -0.06em;
  }
  .typewriter.tw-done::after { opacity: 0.5; }
  @keyframes tw-caret {
    0%, 49.99% { opacity: 0.7; }
    50%, 100% { opacity: 0; }
  }
</style>
</head>
<body>
<div class="slide">

  <div class="header">
    <div class="label-sm fadeup" data-delay="200">
      <span class="num">06</span><span class="rule"></span>
      <span>EVIDENCE · 一手案例研究 · 方法論</span>
    </div>
    <div class="fadeup" data-delay="350" style="font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.22em; color: var(--muted);">COMPARATIVE CASE STUDY</div>
  </div>

  <div class="body-grid">
    <div>
      <h2>
        <span class="typewriter" data-delay="600" data-cps="9" data-sfx="focus">我們訪談的不是水源 —</span><br>
        <span class="typewriter" data-delay="1800" data-cps="9">是<span class="accent">已成功改建</span>的南門。</span>
      </h2>
      <p class="lead fadeup" data-delay="3300">
        擷取「改建後成功要素」<br>
        作為水源改建設計的依據。
      </p>
    </div>

    <div class="method-card fadeup" data-delay="3600">
      <dl>
        <div class="method-row left-fade" data-delay="3800" data-sfx="tap">
          <dt>時間</dt>
          <dd>2026 年</dd>
        </div>
        <div class="method-row left-fade" data-delay="4000" data-sfx="tap">
          <dt>地點</dt>
          <dd>臺北市公有<strong>南門市場</strong></dd>
        </div>
        <div class="method-row left-fade" data-delay="4200" data-sfx="tap">
          <dt>對象</dt>
          <dd>資深攤商 1 位 — 改建前後皆營業</dd>
        </div>
        <div class="method-row left-fade" data-delay="4400" data-sfx="tap">
          <dt>形式</dt>
          <dd>結構化訪談 + 現場錄音 + 逐字稿整理</dd>
        </div>
      </dl>
    </div>
  </div>

  <div class="credit">SHUI-YUAN · SDG · 2026</div>
  <div class="page-indicator"><span class="now">07</span> / 18</div>
</div>

<script>
  function sfx(c){try{window.parent.postMessage({type:'sfx',cue:c},'*')}catch(_){}}

  // Typewriter prep: walk all .typewriter elements, snapshot text nodes,
  // then clear them so the spans are empty until their delay fires.
  document.querySelectorAll('.typewriter').forEach(el => {
    const w = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
    const segs = [];
    let n;
    while ((n = w.nextNode())) {
      if (n.nodeValue) segs.push({ node: n, full: n.nodeValue });
    }
    segs.forEach(s => { s.node.nodeValue = ''; });
    el._tw = segs;
  });

  function typeOut(el, cps) {
    const segs = el._tw || [];
    const total = segs.reduce((a, s) => a + s.full.length, 0);
    el.classList.add('tw-typing');
    let i = 0;
    const id = setInterval(() => {
      i++;
      let r = i;
      for (const s of segs) {
        const take = Math.min(r, s.full.length);
        s.node.nodeValue = s.full.slice(0, take);
        r -= take;
        if (r <= 0) break;
      }
      if (i >= total) {
        clearInterval(id);
        el.classList.remove('tw-typing');
        el.classList.add('tw-done');
        setTimeout(() => el.classList.remove('tw-done'), 1600);
      }
    }, 1000 / cps);
  }

  document.querySelectorAll('[data-delay]').forEach(el => {
    const d = +el.dataset.delay || 0;
    setTimeout(() => {
      if (el.classList.contains('typewriter')) {
        typeOut(el, +el.dataset.cps || 6);
      } else {
        el.classList.add('in');
      }
      if (el.dataset.sfx) sfx(el.dataset.sfx);
    }, d);
  });
</script>
</body>
</html>
