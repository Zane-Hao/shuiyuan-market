<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>09 · 三層解方架構</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body { background: var(--bg); position: relative; overflow: hidden; }

  .slide {
    padding: 88px 96px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 48px;
    position: relative;
    z-index: 1;
  }
  .header { display: flex; justify-content: space-between; align-items: baseline; }

  h2 {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 88px;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink);
    max-width: 1200px;
  }
  h2 .accent { color: var(--accent); }
  .subhead {
    margin-top: 24px;
    font-family: var(--font-body);
    font-size: 22px;
    line-height: 1.55;
    color: var(--ink);
    max-width: 800px;
  }

  .body-grid {
    display: grid;
    grid-template-columns: 0.9fr 1.1fr;
    gap: 80px;
    align-items: center;
  }

  .pyramid {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .tier {
    color: var(--bg);
    font-family: var(--font-display);
    font-weight: 900;
    text-align: center;
    padding: 24px 16px;
    border: 2px solid var(--ink);
    transform: scale(0.9) translateY(40px);
    opacity: 0;
    transition: transform .9s var(--ease-out-back), opacity .9s var(--ease-out-back);
  }
  .tier.in { transform: scale(1) translateY(0); opacity: 1; }
  .tier .name { font-size: 26px; line-height: 1; }
  .tier .en { display: block; margin-top: 6px; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.22em; opacity: 0.8; font-weight: 400; }

  .tier-1 { background: #5C7A85; width: 460px; clip-path: polygon(0 100%, 100% 100%, 90% 0, 10% 0); }
  .tier-2 { background: var(--accent); width: 380px; clip-path: polygon(0 100%, 100% 100%, 90% 0, 10% 0); margin-top: -1px; }
  .tier-3 { background: var(--ink); width: 280px; clip-path: polygon(0 100%, 100% 100%, 100% 0, 0 0); margin-top: -1px; }

  .tier-list {
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  .tier-row {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 24px;
    padding: 20px 0;
    border-top: 1px solid var(--hairline);
    align-items: baseline;
  }
  .tier-row:first-child { border-top: 0; padding-top: 0; }
  .tier-row .ord {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 36px;
    line-height: 1;
  }
  .tier-row .info .name {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 32px;
    color: var(--ink);
  }
  .tier-row .info .sub {
    margin-top: 8px;
    font-family: var(--font-body);
    font-size: 17px;
    color: var(--muted);
  }

  .tier-row.t1 .ord { color: #5C7A85; }
  .tier-row.t2 .ord { color: var(--accent); }
  .tier-row.t3 .ord { color: var(--ink); }

  .fadeup {
    opacity: 0; transform: translateY(18px); filter: blur(6px);
    transition: opacity .7s var(--ease-out-expo), transform .7s var(--ease-out-expo), filter .7s var(--ease-out-expo);
  }
  .fadeup.in { opacity: 1; transform: translateY(0); filter: blur(0); }
</style>
</head>
<body>
<div class="slide">

  <div class="header">
    <div class="label-sm fadeup" data-delay="200">
      <span class="num">08</span><span class="rule"></span>
      <span>SOLUTION · 三層解方架構</span>
    </div>
    <div class="fadeup" data-delay="350" style="font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.22em; color: var(--muted);">由下而上 · 累積式建構</div>
  </div>

  <div class="body-grid">
    <div class="pyramid">
      <div class="tier tier-3" data-delay="2200" data-sfx="stamp"><div class="name">第三階段</div><span class="en">SPATIAL</span></div>
      <div class="tier tier-2" data-delay="1700" data-sfx="stamp"><div class="name">第二階段</div><span class="en">DINING</span></div>
      <div class="tier tier-1" data-delay="1200" data-sfx="stamp"><div class="name">第一階段</div><span class="en">SANITATION</span></div>
    </div>

    <div>
      <h2 class="fadeup" data-delay="600">
        不破壞平價定位的<br>
        <span class="accent">分階段</span>改造。
      </h2>
      <p class="subhead fadeup" data-delay="900">先讓人願意進來，再讓人願意停留，最後讓人願意再來。</p>

      <div class="tier-list" style="margin-top: 50px;">
        <div class="tier-row t1 fadeup" data-delay="2700">
          <div class="ord">01</div>
          <div class="info"><div class="name">衛生底線重建</div><div class="sub">短期 · 3-6 個月</div></div>
        </div>
        <div class="tier-row t2 fadeup" data-delay="2900">
          <div class="ord">02</div>
          <div class="info"><div class="name">餐食區集中化改造</div><div class="sub">中期 · 6-12 個月</div></div>
        </div>
        <div class="tier-row t3 fadeup" data-delay="3100">
          <div class="ord">03</div>
          <div class="info"><div class="name">動線與樓層功能再造</div><div class="sub">長期 · 12 個月以上</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="credit">SHUI-YUAN · SDG · 2026</div>
  <div class="page-indicator"><span class="now">10</span> / 18</div>
</div>

<script>
  function sfx(c){try{window.parent.postMessage({type:'sfx',cue:c},'*')}catch(_){}}
  document.querySelectorAll('[data-delay]').forEach(el=>{
    const d=+el.dataset.delay||0;
    setTimeout(()=>{el.classList.add('in');if(el.dataset.sfx)sfx(el.dataset.sfx)},d);
  });
</script>
</body>
</html>
