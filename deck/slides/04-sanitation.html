<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>03 · 衛生底線</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body { background: var(--bg); position: relative; overflow: hidden; }

  .slide {
    padding: 0;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    height: 100%;
  }

  .photo-pane {
    position: relative;
    overflow: hidden;
    background: #2a1f18;
  }
  .photo-pane img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    animation: photo-zoom 12s var(--ease-out-expo) both, photo-fade 1.2s ease-out both;
  }
  @keyframes photo-zoom { from { transform: scale(1.05); } to { transform: scale(1.18); } }
  @keyframes photo-fade { from { opacity: 0; } to { opacity: 1; } }

  /* annotations layer */
  .annot {
    position: absolute;
    display: flex; align-items: center; gap: 8px;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity .6s var(--ease-out-expo);
    z-index: 3;
  }
  .annot.in { opacity: 1; }
  .annot .arrow {
    font-family: var(--font-display);
    font-size: 36px;
    color: var(--accent);
    text-shadow: 0 0 8px rgba(0,0,0,0.7);
    line-height: 1;
  }
  .annot .text {
    background: var(--accent);
    color: var(--bg);
    font-family: var(--font-mono);
    font-size: 14px;
    letter-spacing: 0.06em;
    padding: 5px 11px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    white-space: nowrap;
  }

  .content-pane {
    padding: 88px 72px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background: var(--bg);
    position: relative;
  }
  .content-pane h2 {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 96px;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-top: 20px;
  }
  .content-pane .sub {
    font-family: var(--font-mono);
    font-size: 16px;
    letter-spacing: 0.14em;
    color: var(--warn);
    margin-bottom: 12px;
  }
  .content-pane .body {
    font-family: var(--font-body);
    font-size: 26px;
    line-height: 1.55;
    color: var(--ink);
    max-width: 600px;
    margin-top: 36px;
  }
  .content-pane .key-stat {
    margin-top: 40px;
    padding: 24px 0;
    border-top: 2px solid var(--ink);
    font-family: var(--font-mono);
    font-size: 14px;
    letter-spacing: 0.18em;
    color: var(--muted);
  }
  .content-pane .key-stat strong {
    color: var(--warn);
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 28px;
    letter-spacing: -0.01em;
  }

  .fadeup {
    opacity: 0; transform: translateY(20px); filter: blur(6px);
    transition: opacity .8s var(--ease-out-expo), transform .8s var(--ease-out-expo), filter .8s var(--ease-out-expo);
  }
  .fadeup.in { opacity: 1; transform: translateY(0); filter: blur(0); }

  .credit { color: var(--ink); }
  .page-indicator { color: var(--ink); }
</style>
</head>
<body>
<div class="slide">

  <div class="photo-pane">
    <img src="../../img/sanitation-issue.png" alt="衛生現況">
    <div class="annot" style="top: 30%; left: 18%;" data-delay="1400" data-sfx="tap">
      <span class="text">肉品塑膠袋懸掛展示</span>
      <span class="arrow">→</span>
    </div>
    <div class="annot" style="top: 55%; left: 50%;" data-delay="1700" data-sfx="tap">
      <span class="arrow">↓</span>
      <span class="text">走道兼通道、人車混流</span>
    </div>
    <div class="annot" style="top: 78%; left: 76%;" data-delay="2000" data-sfx="tap">
      <span class="text">肉品袋裝後置於開放檯面</span>
      <span class="arrow">→</span>
    </div>
  </div>

  <div class="content-pane">
    <div>
      <div class="label-sm fadeup" data-delay="200">
        <span class="num">03</span><span class="rule"></span>
        <span>CURRENT · 現況診斷 · 02</span>
      </div>
      <div class="sub fadeup" data-delay="450" data-sfx="tap">PROBLEM 02</div>
      <h2 class="fadeup" data-delay="700" data-sfx="focus">衛生底線</h2>
      <p class="body fadeup" data-delay="1100">
        肉攤血水、檯面與走道之間沒有明確分界。
        地板濕滑、檯面狼藉 — 這是 Google 評論中最高頻的負評來源。
      </p>
    </div>
    <div class="key-stat fadeup" data-delay="2400" data-sfx="stamp">
      不敢進來 / 不敢久留<br>
      <strong>市場長年被貼上的標籤。</strong>
    </div>

    <div class="credit">SHUI-YUAN · SDG · 2026</div>
    <div class="page-indicator"><span class="now">04</span> / 18</div>
  </div>
</div>

<script>
  function sfx(c){try{window.parent.postMessage({type:'sfx',cue:c},'*')}catch(_){}}
  document.querySelectorAll('[data-delay]').forEach(el=>{
    const d=+el.dataset.delay||0;
    setTimeout(()=>{el.classList.add('in');if(el.dataset.sfx)sfx(el.dataset.sfx)},d);
  });
</script>
</body>
</html>
