<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>03 · 油膩餐食區</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body { background: var(--bg); position: relative; overflow: hidden; }

  .slide {
    padding: 0;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    height: 100%;
  }

  .photo-pane {
    position: relative;
    overflow: hidden;
    background: #2a1810;
  }
  .photo-pane img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    animation: photo-zoom 12s var(--ease-out-expo) both, photo-fade 1.2s ease-out both;
  }
  @keyframes photo-zoom { from { transform: scale(1.05); } to { transform: scale(1.18); } }
  @keyframes photo-fade { from { opacity: 0; } to { opacity: 1; } }

  /* Smoke wisp overlay — abstract suggestion of oily air */
  .smoke {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 30% 70%, rgba(168,54,42,0.25), transparent 55%),
      radial-gradient(ellipse at 70% 40%, rgba(0,0,0,0.18), transparent 60%);
    pointer-events: none;
    animation: smoke-drift 9s ease-in-out infinite alternate;
  }
  @keyframes smoke-drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(20px, -10px) scale(1.05); }
  }

  /* annotations layer */
  .annot {
    position: absolute;
    display: flex; align-items: center; gap: 8px;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity .6s var(--ease-out-expo);
    z-index: 3;
  }
  .annot.in { opacity: 1; }
  .annot .arrow {
    font-family: var(--font-display);
    font-size: 36px;
    color: var(--accent);
    text-shadow: 0 0 8px rgba(0,0,0,0.7);
    line-height: 1;
  }
  .annot .text {
    background: var(--accent);
    color: var(--bg);
    font-family: var(--font-mono);
    font-size: 14px;
    letter-spacing: 0.06em;
    padding: 5px 11px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    white-space: nowrap;
  }

  .content-pane {
    padding: 88px 72px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background: var(--bg);
    position: relative;
  }
  .content-pane h2 {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 96px;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-top: 20px;
  }
  .content-pane .sub {
    font-family: var(--font-mono);
    font-size: 16px;
    letter-spacing: 0.14em;
    color: var(--warn);
    margin-bottom: 12px;
  }
  .content-pane .body {
    font-family: var(--font-body);
    font-size: 26px;
    line-height: 1.55;
    color: var(--ink);
    max-width: 600px;
    margin-top: 36px;
  }
  .content-pane .body strong { color: var(--warn); font-weight: 700; }
  .content-pane .key-stat {
    margin-top: 40px;
    padding: 24px 0;
    border-top: 2px solid var(--ink);
    font-family: var(--font-mono);
    font-size: 14px;
    letter-spacing: 0.18em;
    color: var(--muted);
  }
  .content-pane .key-stat strong {
    color: var(--warn);
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 28px;
    letter-spacing: -0.01em;
  }

  .fadeup {
    opacity: 0; transform: translateY(20px); filter: blur(6px);
    transition: opacity .8s var(--ease-out-expo), transform .8s var(--ease-out-expo), filter .8s var(--ease-out-expo);
  }
  .fadeup.in { opacity: 1; transform: translateY(0); filter: blur(0); }

  .credit { color: var(--ink); }
  .page-indicator { color: var(--ink); }
</style>
</head>
<body>
<div class="slide">

  <div class="photo-pane">
    <img src="../../img/foodzone-1.jpg" alt="油膩餐食區現況">
    <div class="smoke"></div>
  </div>

  <div class="content-pane">
    <div>
      <div class="label-sm fadeup" data-delay="200">
        <span class="num">02</span><span class="rule"></span>
        <span>CURRENT · 現況診斷 · 01</span>
      </div>
      <div class="sub fadeup" data-delay="450" data-sfx="tap">PROBLEM 01</div>
      <h2 class="fadeup" data-delay="700" data-sfx="focus">油膩餐食區</h2>
      <p class="body fadeup" data-delay="1100">
        熟食攤位佔比近兩成，但<strong>排煙與廢水處理仍停留在 1980 年的初代規格</strong>。
        攤前直接用餐 — 油煙、廢水、走道氣味彼此交疊。
      </p>
    </div>
    <div class="key-stat fadeup" data-delay="2400" data-sfx="stamp">
      硬體 1980 / 餐飲 2026<br>
      <strong>46 年的設備差。</strong>
    </div>

    <div class="credit">SHUI-YUAN · SDG · 2026</div>
    <div class="page-indicator"><span class="now">03</span> / 18</div>
  </div>
</div>

<script>
  function sfx(c){try{window.parent.postMessage({type:'sfx',cue:c},'*')}catch(_){}}
  document.querySelectorAll('[data-delay]').forEach(el=>{
    const d=+el.dataset.delay||0;
    setTimeout(()=>{el.classList.add('in');if(el.dataset.sfx)sfx(el.dataset.sfx)},d);
  });
</script>
</body>
</html>
