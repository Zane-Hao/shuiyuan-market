<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>15 · SDG 對齊</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body { background: var(--bg); position: relative; overflow: hidden; }
  body::before {
    content: ''; position: absolute; inset: 0;
    background-image: radial-gradient(rgba(47,93,79,0.045) 1px, transparent 1.5px);
    background-size: 5px 5px; pointer-events: none; opacity: .55;
  }

  .slide {
    padding: 88px 96px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 48px;
    position: relative; z-index: 1;
  }
  .header { display: flex; justify-content: space-between; align-items: baseline; }

  h2 {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 88px;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  h2 .accent { color: var(--accent); }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    align-items: stretch;
    margin-top: 30px;
  }
  .sdg-card {
    color: #fff;
    padding: 32px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    aspect-ratio: 0.95;
    opacity: 0;
    transform: scale(0.85) translateY(30px);
    transition: opacity .9s var(--ease-out-back), transform .9s var(--ease-out-back);
  }
  .sdg-card.in { opacity: 1; transform: scale(1) translateY(0); }
  .sdg-card .top {
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .sdg-card .num {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 110px;
    line-height: 0.85;
    letter-spacing: -0.04em;
  }
  .sdg-card .label {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.22em;
    opacity: 0.85;
  }
  .sdg-card .title {
    margin-top: 16px;
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 22px;
    line-height: 1.2;
  }
  .sdg-card .why {
    margin-top: 14px;
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    opacity: 0.92;
  }

  .sdg-8  { background: #A21942; }
  .sdg-9  { background: #FD6925; }
  .sdg-11 { background: #FD9D24; }
  .sdg-12 { background: #BF8B2E; }

  .footer-line {
    margin-top: 24px;
    text-align: center;
    font-family: var(--font-display);
    font-style: italic;
    font-size: 26px;
    color: var(--ink);
  }
  .footer-line .accent { color: var(--accent); font-weight: 700; }

  .fadeup {
    opacity: 0; transform: translateY(18px); filter: blur(6px);
    transition: opacity .7s var(--ease-out-expo), transform .7s var(--ease-out-expo), filter .7s var(--ease-out-expo);
  }
  .fadeup.in { opacity: 1; transform: translateY(0); filter: blur(0); }
</style>
</head>
<body>
<div class="slide">

  <div class="header">
    <div class="label-sm fadeup" data-delay="200">
      <span class="num">11</span><span class="rule"></span>
      <span>ALIGNMENT · SDG 對應</span>
    </div>
    <div class="fadeup" data-delay="350" style="font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.22em; color: var(--muted);">UNITED NATIONS · SUSTAINABLE GOALS</div>
  </div>

  <div>
    <h2 class="fadeup" data-delay="600">
      對齊聯合國<span class="accent">永續發展目標</span>。
    </h2>

    <div class="grid">
      <div class="sdg-card sdg-8" data-delay="1100" data-sfx="stamp">
        <div class="top"><span class="num">8</span><span class="label">SDG</span></div>
        <div>
          <div class="title">尊嚴就業<br>與經濟成長</div>
          <p class="why">200+ 攤商透過環境升級延長停留時間，帶動營收與就業穩定。</p>
        </div>
      </div>
      <div class="sdg-card sdg-9" data-delay="1350" data-sfx="stamp">
        <div class="top"><span class="num">9</span><span class="label">SDG</span></div>
        <div>
          <div class="title">產業創新<br>與基礎建設</div>
          <p class="why">把 1980 年硬體升級為現代基礎建設；可複製範本。</p>
        </div>
      </div>
      <div class="sdg-card sdg-11" data-delay="1600" data-sfx="stamp">
        <div class="top"><span class="num">11</span><span class="label">SDG</span></div>
        <div>
          <div class="title">永續城市<br>與社區</div>
          <p class="why">不百貨化的前提下，與社區共存共榮，保留庶民日常。</p>
        </div>
      </div>
      <div class="sdg-card sdg-12" data-delay="1850" data-sfx="stamp">
        <div class="top"><span class="num">12</span><span class="label">SDG</span></div>
        <div>
          <div class="title">責任消費<br>與生產</div>
          <p class="why">統一餐盤、生熟食分流降低廢水與一次性餐具。</p>
        </div>
      </div>
    </div>

    <p class="footer-line fadeup" data-delay="2300" data-sfx="focus">
      四項目標 · 一個市場 · <span class="accent">完整對應</span>。
    </p>
  </div>

  <div class="credit">SHUI-YUAN · SDG · 2026</div>
  <div class="page-indicator"><span class="now">16</span> / 18</div>
</div>

<script>
  function sfx(c){try{window.parent.postMessage({type:'sfx',cue:c},'*')}catch(_){}}
  document.querySelectorAll('[data-delay]').forEach(el=>{
    const d=+el.dataset.delay||0;
    setTimeout(()=>{el.classList.add('in');if(el.dataset.sfx)sfx(el.dataset.sfx)},d);
  });
</script>
</body>
</html>
