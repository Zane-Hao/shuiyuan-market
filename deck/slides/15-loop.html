<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>14 · 永續循環</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body { background: var(--ink); color: var(--bg); position: relative; overflow: hidden; }

  .slide {
    padding: 88px 96px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 24px;
    height: 100%;
  }
  .header { display: flex; justify-content: space-between; align-items: baseline; }
  .header .label-sm { color: rgba(251,247,238,0.78); }
  .header .label-sm .rule { background: rgba(251,247,238,0.55); }
  .header .right { font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.22em; color: rgba(251,247,238,0.55); }

  h2 {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 60px;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--bg);
    max-width: 800px;
    margin-top: 8px;
  }
  h2 .accent { color: var(--accent); font-style: italic; }

  .body-grid {
    display: grid;
    grid-template-columns: 1fr 1.1fr;
    align-items: center;
    gap: 60px;
  }

  .loop-svg {
    width: 100%;
    max-width: 600px;
    height: auto;
    margin: 0 auto;
  }

  .narrative {
    color: rgba(251,247,238,0.92);
  }
  .narrative h3 {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 700;
    font-size: 38px;
    line-height: 1.3;
  }
  .narrative h3 .accent { color: var(--accent); }
  .narrative p {
    margin-top: 20px;
    font-family: var(--font-body);
    font-size: 19px;
    line-height: 1.6;
    color: rgba(251,247,238,0.85);
  }
  .narrative .quote-tag {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid rgba(251,247,238,0.22);
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 0.18em;
    color: rgba(251,247,238,0.55);
    text-transform: uppercase;
  }
  .narrative .quote-tag strong {
    color: var(--accent);
    font-weight: 700;
  }

  .fadeup {
    opacity: 0; transform: translateY(18px); filter: blur(6px);
    transition: opacity .8s var(--ease-out-expo), transform .8s var(--ease-out-expo), filter .8s var(--ease-out-expo);
  }
  .fadeup.in { opacity: 1; transform: translateY(0); filter: blur(0); }

  /* Loop nodes pop in sequence */
  .node {
    opacity: 0;
    transform-origin: center;
    transform: scale(0.4);
    transition: opacity .5s var(--ease-out-back), transform .6s var(--ease-out-back);
  }
  .node.in { opacity: 1; transform: scale(1); }

  .arc {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    transition: stroke-dashoffset 1.2s var(--ease-out-expo);
  }
  .arc.drawn { stroke-dashoffset: 0; }

  .credit { color: rgba(251,247,238,0.6); }
  .page-indicator { color: rgba(251,247,238,0.85); }
  .page-indicator .now { color: var(--accent); }
</style>
</head>
<body>
<div class="slide">

  <div class="header">
    <div class="label-sm fadeup" data-delay="200">
      <span class="num" style="color: var(--accent);">10</span><span class="rule"></span>
      <span>FEEDBACK · 自我強化迴路</span>
    </div>
    <div class="right fadeup" data-delay="350">FIVE-YEAR DYNAMIC SYSTEM</div>
  </div>

  <div class="body-grid">

    <svg class="loop-svg" viewBox="0 0 800 800">
      <defs>
        <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 Z" fill="#E07A3C"/>
        </marker>
      </defs>

      <!-- 6 nodes in circular layout -->
      <g class="node" data-delay="900" data-sfx="tap">
        <circle cx="400" cy="170" r="68" fill="#FBF7EE" stroke="#E07A3C" stroke-width="2.5"/>
        <text x="400" y="160" text-anchor="middle" font-size="14" font-weight="700" fill="#2F5D4F" font-family="Noto Sans TC">環境改善</text>
        <text x="400" y="190" text-anchor="middle" font-size="26" font-weight="900" fill="#E07A3C" font-family="Noto Serif TC">82</text>
        <text x="400" y="208" text-anchor="middle" font-size="10" fill="#2F5D4F" opacity="0.6" font-family="JetBrains Mono">/100</text>
      </g>

      <g class="node" data-delay="1100" data-sfx="tap">
        <circle cx="600" cy="285" r="68" fill="#FBF7EE" stroke="#E07A3C" stroke-width="2.5"/>
        <text x="600" y="275" text-anchor="middle" font-size="14" font-weight="700" fill="#2F5D4F" font-family="Noto Sans TC">停留時間</text>
        <text x="600" y="305" text-anchor="middle" font-size="26" font-weight="900" fill="#E07A3C" font-family="Noto Serif TC">55</text>
        <text x="600" y="323" text-anchor="middle" font-size="10" fill="#2F5D4F" opacity="0.6" font-family="JetBrains Mono">分鐘</text>
      </g>

      <g class="node" data-delay="1300" data-sfx="tap">
        <circle cx="600" cy="515" r="68" fill="#FBF7EE" stroke="#E07A3C" stroke-width="2.5"/>
        <text x="600" y="505" text-anchor="middle" font-size="14" font-weight="700" fill="#2F5D4F" font-family="Noto Sans TC">消費金額</text>
        <text x="600" y="535" text-anchor="middle" font-size="26" font-weight="900" fill="#E07A3C" font-family="Noto Serif TC">295</text>
        <text x="600" y="553" text-anchor="middle" font-size="10" fill="#2F5D4F" opacity="0.6" font-family="JetBrains Mono">元/客</text>
      </g>

      <g class="node" data-delay="1500" data-sfx="tap">
        <circle cx="400" cy="630" r="68" fill="#FBF7EE" stroke="#E07A3C" stroke-width="2.5"/>
        <text x="400" y="620" text-anchor="middle" font-size="14" font-weight="700" fill="#2F5D4F" font-family="Noto Sans TC">攤商營收</text>
        <text x="400" y="650" text-anchor="middle" font-size="26" font-weight="900" fill="#E07A3C" font-family="Noto Serif TC">165</text>
        <text x="400" y="668" text-anchor="middle" font-size="10" fill="#2F5D4F" opacity="0.6" font-family="JetBrains Mono">Index</text>
      </g>

      <g class="node" data-delay="1700" data-sfx="tap">
        <circle cx="200" cy="515" r="68" fill="#FBF7EE" stroke="#E07A3C" stroke-width="2.5"/>
        <text x="200" y="505" text-anchor="middle" font-size="14" font-weight="700" fill="#2F5D4F" font-family="Noto Sans TC">投資意願</text>
        <text x="200" y="535" text-anchor="middle" font-size="26" font-weight="900" fill="#E07A3C" font-family="Noto Serif TC">75</text>
        <text x="200" y="553" text-anchor="middle" font-size="10" fill="#2F5D4F" opacity="0.6" font-family="JetBrains Mono">% 攤商</text>
      </g>

      <g class="node" data-delay="1900" data-sfx="tap">
        <circle cx="200" cy="285" r="68" fill="#FBF7EE" stroke="#E07A3C" stroke-width="2.5"/>
        <text x="200" y="275" text-anchor="middle" font-size="14" font-weight="700" fill="#2F5D4F" font-family="Noto Sans TC">市場品質</text>
        <text x="200" y="305" text-anchor="middle" font-size="26" font-weight="900" fill="#E07A3C" font-family="Noto Serif TC">84</text>
        <text x="200" y="323" text-anchor="middle" font-size="10" fill="#2F5D4F" opacity="0.6" font-family="JetBrains Mono">/100</text>
      </g>

      <!-- arcs between adjacent nodes -->
      <path class="arc" d="M 460 200 Q 580 220 555 240" fill="none" stroke="#E07A3C" stroke-width="3" data-delay="2200" marker-end="url(#arrowHead)"/>
      <path class="arc" d="M 615 350 Q 640 400 615 450" fill="none" stroke="#E07A3C" stroke-width="3" data-delay="2400" marker-end="url(#arrowHead)"/>
      <path class="arc" d="M 555 560 Q 480 600 460 600" fill="none" stroke="#E07A3C" stroke-width="3" data-delay="2600" marker-end="url(#arrowHead)"/>
      <path class="arc" d="M 340 600 Q 260 600 245 560" fill="none" stroke="#E07A3C" stroke-width="3" data-delay="2800" marker-end="url(#arrowHead)"/>
      <path class="arc" d="M 185 450 Q 160 400 185 350" fill="none" stroke="#E07A3C" stroke-width="3" data-delay="3000" marker-end="url(#arrowHead)"/>
      <path class="arc" d="M 245 240 Q 320 220 340 200" fill="none" stroke="#E07A3C" stroke-width="3" data-delay="3200" marker-end="url(#arrowHead)"/>

      <!-- center year 5.0 -->
      <text class="node" data-delay="3500" x="400" y="420" text-anchor="middle" font-size="100" font-weight="900" fill="#E07A3C" font-family="Noto Serif TC" letter-spacing="-0.04em">5.0</text>
      <text class="node" data-delay="3500" x="400" y="450" text-anchor="middle" font-size="13" fill="#FBF7EE" opacity="0.6" font-family="JetBrains Mono" letter-spacing="3">YEAR</text>
    </svg>

    <div class="narrative">
      <h3 class="fadeup" data-delay="600">
        一個能<span class="accent">自己長大</span>的迴路。
      </h3>
      <p class="fadeup" data-delay="900">
        改造的價值不在某一階段的單點改善，
        而在讓六個節點彼此餵養 — 環境讓人停留，
        停留帶來消費，消費讓攤商敢投資，投資再回到環境。
      </p>
      <div class="quote-tag fadeup" data-delay="3700" data-sfx="chime">
        Y0 → Y5 · <strong>市場品質 +110%</strong>
      </div>
    </div>

  </div>

  <div class="credit">SHUI-YUAN · SDG · 2026</div>
  <div class="page-indicator"><span class="now">15</span> / 18</div>
</div>

<script>
  function sfx(c){try{window.parent.postMessage({type:'sfx',cue:c},'*')}catch(_){}}
  document.querySelectorAll('[data-delay]').forEach(el=>{
    const d=+el.dataset.delay||0;
    setTimeout(()=>{
      if (el.classList.contains('arc')) el.classList.add('drawn');
      else el.classList.add('in');
      if(el.dataset.sfx) sfx(el.dataset.sfx);
    }, d);
  });
</script>
</body>
</html>
